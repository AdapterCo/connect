version: '3.8'

services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: adapterconnect
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - adapterconnect_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  app:
    image: connect-app:latest
    build: .
    environment:
      - PORT=3009
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/adapterconnect?schema=public
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PLATFORM_MP_ACCESS_TOKEN=${PLATFORM_MP_ACCESS_TOKEN}
      - PLATFORM_MP_PUBLIC_KEY=${PLATFORM_MP_PUBLIC_KEY}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}
      - DOMAIN=${DOMAIN:-connect.adapterco.com.br}
      - RETENTION_ENABLED=${RETENTION_ENABLED:-false}
      - AUDIT_LOG_RETENTION_DAYS=${AUDIT_LOG_RETENTION_DAYS:-365}
      - SYSTEM_LOG_RETENTION_DAYS=${SYSTEM_LOG_RETENTION_DAYS:-180}
      - MESSAGE_RETENTION_DAYS=${MESSAGE_RETENTION_DAYS:-0}
    volumes:
      - auth_data:/app/auth_info_baileys
      - uploads_data:/app/public/uploads
    depends_on:
      - db
    networks:
      - adapterconnect_internal
      - traefik9
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3009/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik9"

        # Router HTTPS
        - "traefik.http.routers.adapterconnect-https.rule=Host(`${DOMAIN:-connect.adapterco.com.br}`)"
        - "traefik.http.routers.adapterconnect-https.entrypoints=https"
        - "traefik.http.routers.adapterconnect-https.tls=true"
        - "traefik.http.routers.adapterconnect-https.tls.certresolver=letsencrypt"
        - "traefik.http.routers.adapterconnect-https.service=adapterconnect-service"

        # Router HTTP — redirect to HTTPS
        - "traefik.http.routers.adapterconnect-http.rule=Host(`${DOMAIN:-connect.adapterco.com.br}`)"
        - "traefik.http.routers.adapterconnect-http.entrypoints=http"
        - "traefik.http.routers.adapterconnect-http.middlewares=adapterconnect-https-redirect"

        # Middleware
        - "traefik.http.middlewares.adapterconnect-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.adapterconnect-https-redirect.redirectscheme.permanent=true"

        # Service
        - "traefik.http.services.adapterconnect-service.loadbalancer.server.port=3009"

volumes:
  pgdata:
  auth_data:
  uploads_data:

networks:
  adapterconnect_internal:
    driver: overlay
  traefik9:
    external: true
