services:
  db:
    image: postgres:14-alpine
    container_name: adapterconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: adapterconnect
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - adapterconnect_internal

  app:
    build: .
    container_name: adapterconnect-app
    restart: unless-stopped

    expose:
      - "3009"

    environment:
      - PORT=3009
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/adapterconnect?schema=public
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DOMAIN=${DOMAIN:-connect.adapterco.com.br}

    volumes:
      - auth_data:/app/auth_info_baileys
      - uploads_data:/app/public/uploads

    depends_on:
      - db

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik9"

      # HTTP
      - "traefik.http.routers.adapterconnect-http.rule=Host(`${DOMAIN:-connect.adapterco.com.br}`)"
      - "traefik.http.routers.adapterconnect-http.entrypoints=http"
      - "traefik.http.routers.adapterconnect-http.middlewares=https-redirect"

      # HTTPS
      - "traefik.http.routers.adapterconnect.rule=Host(`${DOMAIN:-connect.adapterco.com.br}`)"
      - "traefik.http.routers.adapterconnect.entrypoints=https"
      - "traefik.http.routers.adapterconnect.tls=true"
      - "traefik.http.routers.adapterconnect.tls.certresolver=letsencrypt"

      # Redirect
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

      # Service
      - "traefik.http.services.adapterconnect.loadbalancer.server.port=3009"

    networks:
      - adapterconnect_internal
      - traefik9

volumes:
  pgdata:
  auth_data:
  uploads_data:

networks:
  adapterconnect_internal:
    driver: bridge

  traefik9:
    external: true