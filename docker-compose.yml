services:
  db:
    image: postgres:14-alpine
    container_name: adapterconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: adapterconnect
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - adapterconnect_internal

  app:
    build: .
    container_name: adapterconnect-app
    restart: unless-stopped

    expose:
      - "3009"

    environment:
      - PORT=3009
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/adapterconnect?schema=public
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PLATFORM_MP_ACCESS_TOKEN=${PLATFORM_MP_ACCESS_TOKEN}
      - PLATFORM_MP_PUBLIC_KEY=${PLATFORM_MP_PUBLIC_KEY}
      - MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}
      - DOMAIN=${DOMAIN:-connect.adapterco.com.br}
      - RETENTION_ENABLED=${RETENTION_ENABLED:-false}
      - AUDIT_LOG_RETENTION_DAYS=${AUDIT_LOG_RETENTION_DAYS:-365}
      - SYSTEM_LOG_RETENTION_DAYS=${SYSTEM_LOG_RETENTION_DAYS:-180}
      - MESSAGE_RETENTION_DAYS=${MESSAGE_RETENTION_DAYS:-0}

    volumes:
      - auth_data:/app/auth_info_baileys
      - uploads_data:/app/public/uploads

    depends_on:
      - db

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3009/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik9"

      # HTTP
      - "traefik.http.routers.adapterconnect-http.rule=Host(`${DOMAIN:-connect.adapterco.com.br}`)"
      - "traefik.http.routers.adapterconnect-http.entrypoints=http"
      - "traefik.http.routers.adapterconnect-http.middlewares=https-redirect"

      # HTTPS
      - "traefik.http.routers.adapterconnect.rule=Host(`${DOMAIN:-connect.adapterco.com.br}`)"
      - "traefik.http.routers.adapterconnect.entrypoints=https"
      - "traefik.http.routers.adapterconnect.tls=true"
      - "traefik.http.routers.adapterconnect.tls.certresolver=letsencrypt"

      # Redirect
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

      # Service
      - "traefik.http.services.adapterconnect.loadbalancer.server.port=3009"

    networks:
      - adapterconnect_internal
      - traefik9

volumes:
  pgdata:
  auth_data:
  uploads_data:

networks:
  adapterconnect_internal:
    driver: bridge

  traefik9:
    external: true
