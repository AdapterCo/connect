version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: adapterconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: adapterconnect
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - adapterconnect_internal

  app:
    build: .
    container_name: adapterconnect-app
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/adapterconnect?schema=public
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DOMAIN=${DOMAIN:-connect.adapterco.com.br}
    volumes:
      - auth_data:/app/auth_info_baileys
      - uploads_data:/app/public/uploads
    depends_on:
      - db
    networks:
      - adapterconnect_internal
      - traefik9
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik9"

      # Router HTTPS
      - "traefik.http.routers.adapterconnect-https.rule=Host(`${DOMAIN:-connect.adapterco.com.br}`)"
      - "traefik.http.routers.adapterconnect-https.entrypoints=https"
      - "traefik.http.routers.adapterconnect-https.tls=true"
      - "traefik.http.routers.adapterconnect-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.adapterconnect-https.service=adapterconnect-service"

      # Router HTTP — redirect to HTTPS
      - "traefik.http.routers.adapterconnect-http.rule=Host(`${DOMAIN:-connect.adapterco.com.br}`)"
      - "traefik.http.routers.adapterconnect-http.entrypoints=http"
      - "traefik.http.routers.adapterconnect-http.middlewares=adapterconnect-https-redirect"

      # Middleware
      - "traefik.http.middlewares.adapterconnect-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.adapterconnect-https-redirect.redirectscheme.permanent=true"

      # Service
      - "traefik.http.services.adapterconnect-service.loadbalancer.server.port=3000"

volumes:
  pgdata:
  auth_data:
  uploads_data:

networks:
  adapterconnect_internal:
    driver: bridge
  traefik9:
    external: true
